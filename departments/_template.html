<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>部门名称 · 年度报告 | 三院科协</title>
<!--
  System: Collage Brutalism — matching the main report
  Type scale: Maple Mono · weight 400/700
  Color: #0F4464 (navy) on #FFFFFF · accent #E8EDF2
  Layout: rotated blocks, thick borders, zine-style misalignment
-->
<style>
@font-face {
  font-family: 'Maple';
  src: url('https://cdn.jsdelivr.net/npm/maple-mono@1.0.1/dist/MapleMono-Regular.woff2') format('woff2');
  font-weight: 400;
}
@font-face {
  font-family: 'Maple';
  src: url('https://cdn.jsdelivr.net/npm/maple-mono@1.0.1/dist/MapleMono-Bold.woff2') format('woff2');
  font-weight: 700;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; scroll-snap-type: y mandatory; }

body {
  font-family: 'Maple', 'Courier New', monospace;
  background: #F4F2EE;
  color: #0F4464;
  line-height: 1.35;
  -webkit-font-smoothing: antialiased;
}

::selection { background: #0F4464; color: #FFFFFF; }

/* ==============================
   NAV DOTS
   ============================== */
.zine-nav {
  position: fixed; left: 24px; top: 50%; transform: translateY(-50%);
  z-index: 200; display: flex; flex-direction: column; gap: 12px;
  transition: opacity 0.35s;
}
.zine-nav.hidden { opacity: 0; pointer-events: none; }
.zine-nav a {
  display: block; width: 12px; height: 12px;
  background: #0F4464; opacity: 0.15;
  transform: rotate(45deg);
  transition: all 0.25s;
}
.zine-nav a.active { opacity: 0.8; transform: rotate(45deg) scale(1.6); }
.zine-nav a:hover { opacity: 0.5; }

.kb-hint {
  position: fixed; bottom: 20px; right: 28px; z-index: 300;
  font-size: 13px; color: #0F4464;
  opacity: 0.2; letter-spacing: 2px;
  pointer-events: none;
  transform: rotate(-1deg);
}

/* ==============================
   SLIDE BASE
   ============================== */
.slide {
  min-height: 100vh;
  scroll-snap-align: start;
  padding: 64px 48px;
  position: relative;
  overflow: hidden;
  display: flex; flex-direction: column;
  justify-content: center;
}

/* ==============================
   COVER
   ============================== */
.dept-cover {
  background: #0F4464; color: #FFFFFF;
  justify-content: center; align-items: center;
  text-align: center;
}
.dept-cover .dc-inner {
  position: relative; z-index: 2;
  max-width: 800px;
  display: flex; flex-direction: column; align-items: center;
}
.dept-cover .dc-breadcrumb {
  display: inline-block;
  border: 4px solid rgba(255,255,255,0.2);
  padding: 8px 24px;
  font-size: 14px; letter-spacing: 3px;
  transform: rotate(-1deg);
  margin-bottom: 24px;
}
.dept-cover .dc-breadcrumb a { color: rgba(255,255,255,0.5); text-decoration: none; }
.dept-cover .dc-icon {
  width: 80px; height: 80px;
  border: 5px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; margin-bottom: 20px;
  transform: rotate(2deg);
}
.dept-cover h1 {
  font-size: clamp(56px, 10vw, 100px);
  font-weight: 700;
  letter-spacing: -2px;
  transform: rotate(-0.5deg);
  line-height: 1;
}
.dept-cover .dc-sub {
  font-size: 22px; opacity: 0.4;
  margin-top: 16px; letter-spacing: 3px;
  transform: rotate(0.3deg);
}
.dept-cover .dc-stats {
  display: flex; gap: 32px; margin-top: 28px;
}
.dept-cover .dc-stats span {
  font-size: 18px; opacity: 0.5;
  letter-spacing: 2px;
}
.dept-cover .dc-img-float {
  position: absolute;
  border: 5px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.03);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: rgba(255,255,255,0.1);
}
.dept-cover .dc-img-float.f1 {
  width: 200px; height: 160px;
  top: 20%; right: -30px;
  transform: rotate(4deg);
}
.dept-cover .dc-img-float.f2 {
  width: 160px; height: 120px;
  bottom: 15%; left: -20px;
  transform: rotate(-3deg);
}

/* ==============================
   COLLAGE HEADER
   ============================== */
.collage-header {
  position: relative; z-index: 2;
  margin-bottom: 28px;
  transform: rotate(-0.5deg);
}
.collage-header .ch-tag {
  display: inline-block;
  font-size: 14px; font-weight: 700;
  letter-spacing: 5px;
  border: 4px solid #0F4464;
  padding: 6px 18px;
  margin-bottom: 10px;
  transform: rotate(-1.5deg);
}
.collage-header h2 {
  font-size: clamp(36px, 7vw, 64px);
  font-weight: 700;
  letter-spacing: -1px;
  line-height: 1.1;
}

/* ==============================
   DIRECTION CARDS
   ============================== */
.dir-grid {
  display: grid;
  grid-template-columns: repeat( /* auto-fill, minmax(260px, 1fr) — set in slide */ );
  gap: 14px;
  flex: 1; position: relative; z-index: 2;
  align-content: center;
}
.dir-grid .dir-card {
  border: 6px solid #0F4464;
  background: #FFFFFF;
  padding: 28px 24px;
  display: flex; flex-direction: column;
  transition: all 0.15s;
}
.dir-grid .dir-card:nth-child(odd) { transform: rotate(-0.6deg); }
.dir-grid .dir-card:nth-child(even) { transform: rotate(0.6deg); }
.dir-grid .dir-card:hover {
  background: #0F4464; color: #FFFFFF;
  transform: rotate(0deg) scale(1.02);
  z-index: 5;
}
.dir-grid .dir-card:hover .dir-desc { color: rgba(255,255,255,0.7); }
.dir-grid .dir-card .dir-icon { font-size: 28px; margin-bottom: 6px; }
.dir-grid .dir-card .dir-name { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.dir-grid .dir-card .dir-desc { font-size: 14px; color: #6A8A9A; line-height: 1.5; }
.dir-grid .dir-card .dir-count {
  margin-top: auto; padding-top: 12px;
  font-size: 13px; font-weight: 700;
  border-top: 2px solid rgba(15,68,100,0.1);
}

/* ==============================
   PROJECT CARDS
   ============================== */
.proj-list {
  display: flex; flex-direction: column;
  gap: 10px;
  flex: 1; position: relative; z-index: 2;
  justify-content: center;
}
.proj-list .proj-card {
  border: 5px solid #0F4464;
  background: #FFFFFF;
  padding: 18px 22px;
  display: flex;
  gap: 16px;
  transition: all 0.15s;
  position: relative;
}
.proj-list .proj-card:nth-child(odd) { transform: rotate(-0.3deg); }
.proj-list .proj-card:nth-child(even) { transform: rotate(0.4deg); }
.proj-list .proj-card:hover {
  background: #0F4464; color: #FFFFFF;
  transform: rotate(0deg) scale(1.01);
  z-index: 5;
}
.proj-list .proj-card:hover .proj-meta,
.proj-list .proj-card:hover .proj-desc { color: rgba(255,255,255,0.7); }
.proj-list .proj-card:hover .proj-tags span {
  border-color: rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.7);
}
.proj-list .proj-card .proj-thumb {
  width: 100px; min-height: 80px;
  border: 3px dashed #0F4464;
  background: #F0F3F6;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
.proj-list .proj-card:hover .proj-thumb {
  border-color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.05);
}
.proj-list .proj-card .proj-info { flex: 1; min-width: 0; }
.proj-list .proj-card .proj-title { font-size: 19px; font-weight: 700; margin-bottom: 2px; }
.proj-list .proj-card .proj-meta {
  font-size: 12px; color: #6A8A9A; margin-bottom: 4px;
}
.proj-list .proj-card .proj-desc {
  font-size: 13px; color: #6A8A9A; line-height: 1.5;
}
.proj-list .proj-card .proj-tags {
  display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap;
}
.proj-list .proj-card .proj-tags span {
  padding: 2px 10px; border: 2px solid rgba(15,68,100,0.15);
  font-size: 11px; color: #0F4464;
}

/* ==============================
   TIMELINE
   ============================== */
.timeline {
  position: relative; z-index: 2;
  padding: 0 0 0 40px;
  flex: 1;
  display: flex; flex-direction: column;
  justify-content: center;
}
.timeline::before {
  content: '';
  position: absolute; left: 12px; top: 0; bottom: 0;
  width: 4px; background: #0F4464;
}
.timeline .tl-item {
  position: relative;
  border: 5px solid #0F4464;
  background: #FFFFFF;
  padding: 18px 22px;
  margin-bottom: 10px;
  transition: all 0.15s;
}
.timeline .tl-item:nth-child(odd) { transform: rotate(-0.3deg); }
.timeline .tl-item:nth-child(even) { transform: rotate(0.3deg); }
.timeline .tl-item:hover {
  background: #0F4464; color: #FFFFFF;
  transform: rotate(0deg) scale(1.01);
  z-index: 5;
}
.timeline .tl-item:hover .t-date,
.timeline .tl-item:hover .t-desc { color: rgba(255,255,255,0.7); }
.timeline .tl-item::before {
  content: '';
  position: absolute; left: -34px; top: 20px;
  width: 16px; height: 16px;
  background: #FFFFFF; border: 4px solid #0F4464;
  transform: rotate(45deg);
}
.timeline .tl-item .t-date {
  font-size: 13px; font-weight: 700; color: #6A8A9A; letter-spacing: 2px;
  margin-bottom: 2px;
}
.timeline .tl-item .t-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.timeline .tl-item .t-desc { font-size: 14px; color: #6A8A9A; line-height: 1.5; }

/* ==============================
   STATS GRID
   ============================== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  flex: 1; position: relative; z-index: 2;
  align-content: center;
}
.stats-grid .stat-card {
  border: 6px solid #0F4464;
  background: #FFFFFF;
  padding: 32px 20px;
  text-align: center;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.stats-grid .stat-card:nth-child(1) { transform: rotate(-0.8deg); }
.stats-grid .stat-card:nth-child(2) { transform: rotate(0.6deg); }
.stats-grid .stat-card:nth-child(3) { transform: rotate(-0.4deg); }
.stats-grid .stat-card .stat-num {
  font-size: clamp(48px, 8vw, 72px);
  font-weight: 700; line-height: 1;
}
.stats-grid .stat-card .stat-label {
  font-size: 16px; color: #6A8A9A; margin-top: 6px; letter-spacing: 2px;
}

/* ==============================
   TEXT BLOCK
   ============================== */
.text-block {
  border: 6px solid #0F4464;
  background: #FFFFFF;
  padding: 32px;
  font-size: 22px;
  line-height: 1.6;
  position: relative; z-index: 2;
  transform: rotate(-0.3deg);
  max-width: 800px;
}
.text-block p { margin-bottom: 0.6em; }
.text-block p:last-child { margin-bottom: 0; }

/* ==============================
   MEMBER GRID
   ============================== */
.member-grid {
  display: grid;
  grid-template-columns: repeat( /* auto-fill — set in slide */ );
  gap: 12px;
  flex: 1; position: relative; z-index: 2;
  align-content: center;
}
.member-grid .member-card {
  border: 5px solid #0F4464;
  background: #FFFFFF;
  padding: 20px;
  text-align: center;
  transition: all 0.15s;
}
.member-grid .member-card:nth-child(1) { transform: rotate(-0.8deg); }
.member-grid .member-card:nth-child(2) { transform: rotate(0.6deg); }
.member-grid .member-card:nth-child(3) { transform: rotate(-0.4deg); }
.member-grid .member-card:nth-child(4) { transform: rotate(1deg); }
.member-grid .member-card:nth-child(5) { transform: rotate(-0.6deg); }
.member-grid .member-card:nth-child(6) { transform: rotate(0.3deg); }
.member-grid .member-card:hover {
  background: #0F4464; color: #FFFFFF;
  transform: rotate(0deg) scale(1.03);
  z-index: 5;
}
.member-grid .member-card .avatar {
  width: 52px; height: 52px;
  border: 3px solid #0F4464;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin: 0 auto 8px;
}
.member-grid .member-card:hover .avatar {
  border-color: rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.1);
}
.member-grid .member-card .name { font-size: 16px; font-weight: 700; }
.member-grid .member-card .role { font-size: 13px; color: #6A8A9A; margin-top: 2px; }
.member-grid .member-card:hover .role { color: rgba(255,255,255,0.6); }

/* ==============================
   CTA LINK
   ============================== */
.cta-wrap {
  text-align: center; margin-top: 20px;
  position: relative; z-index: 2;
}
.cta-link {
  display: inline-block;
  border: 5px solid #0F4464;
  background: #0F4464; color: #FFFFFF;
  padding: 14px 36px;
  font-size: 20px; font-weight: 700;
  text-decoration: none;
  transform: rotate(0.5deg);
  transition: all 0.15s;
  font-family: 'Maple', 'Courier New', monospace;
}
.cta-link:hover {
  background: #FFFFFF; color: #0F4464;
  transform: rotate(0deg) scale(1.03);
}

/* ==============================
   CLOSING DEPT NAV
   ============================== */
.slide-closing {
  background: #0F4464; color: #FFFFFF;
  justify-content: center; align-items: center;
  text-align: center;
  gap: 40px;
}
.slide-closing .closing-title-block { transform: rotate(-0.8deg); }
.slide-closing .closing-title-block h2 {
  font-size: clamp(44px, 9vw, 80px);
  font-weight: 700; letter-spacing: -2px;
  margin-bottom: 4px;
}
.slide-closing .closing-sub {
  font-size: 22px; opacity: 0.3; letter-spacing: 4px;
}
.closing-dept-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 16px; width: 100%; max-width: 900px;
  position: relative; z-index: 2;
}
.closing-dept-grid .cdg-card {
  border: 6px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.03);
  padding: 36px 32px;
  display: flex; flex-direction: column; align-items: flex-start;
  text-align: left; text-decoration: none; color: #FFFFFF;
  transition: all 0.15s; position: relative;
}
.closing-dept-grid .cdg-card:nth-child(1) { transform: rotate(-1.2deg); }
.closing-dept-grid .cdg-card:nth-child(2) { transform: rotate(1deg); margin-top: 6px; }
.closing-dept-grid .cdg-card:nth-child(3) { transform: rotate(0.6deg); margin-top: -6px; }
.closing-dept-grid .cdg-card:nth-child(4) { transform: rotate(-0.8deg); }
.closing-dept-grid .cdg-card:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.5);
  transform: rotate(0deg) scale(1.03); z-index: 5;
}
.closing-dept-grid .cdg-card .cdg-icon { font-size: 40px; margin-bottom: 4px; }
.closing-dept-grid .cdg-card .cdg-name { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
.closing-dept-grid .cdg-card .cdg-desc {
  font-size: 15px; color: rgba(255,255,255,0.3);
  letter-spacing: 1px; margin-top: 4px;
}
.closing-dept-grid .cdg-card .cdg-arrow {
  position: absolute; bottom: 20px; right: 24px;
  font-size: 28px; opacity: 0.15;
}

/* ==============================
   DECORATIVE
   ============================== */
.slide .ghost-block {
  position: absolute;
  border: 4px dashed #0F4464;
  opacity: 0.05;
  pointer-events: none;
  z-index: 0;
}

/* ==============================
   RESPONSIVE
   ============================== */
@media (max-width: 800px) {
  .slide { padding: 60px 20px 32px; }
  .proj-list .proj-card { flex-direction: column; }
  .proj-list .proj-card .proj-thumb { width: 100%; min-height: 60px; }
  .member-grid { grid-template-columns: 1fr 1fr; }
  .stats-grid { grid-template-columns: 1fr; }
  .dir-grid { grid-template-columns: 1fr; }
  .timeline { padding-left: 28px; }
  .timeline .tl-item::before { left: -22px; width: 12px; height: 12px; }
  .dept-cover .dc-stats { flex-direction: column; gap: 8px; }
  .closing-dept-grid { grid-template-columns: 1fr; }
  .closing-dept-grid .cdg-card { margin-top: 0 !important; }
}
/* ---- SHORT VIEWPORT (e.g. 1080p) — tighten to avoid overflow ---- */
@media (max-height: 1150px) {
  .slide { padding: 40px 36px; }
  .collage-header { margin-bottom: 14px; }
  .collage-header h2 { font-size: clamp(28px, 5vw, 48px); }
  .proj-list .proj-card { padding: 14px 18px; }
  .proj-list .proj-card .proj-title { font-size: 16px; }
  .proj-list .proj-card .proj-desc { font-size: 12px; }
}
</style>
</head>
<body>

<nav class="zine-nav" id="zineNav"></nav>

<script>
const slides = document.querySelectorAll('[data-index]');
const nav = document.getElementById('zineNav');

slides.forEach(s => {
  const a = document.createElement('a');
  a.href = '#'; a.dataset.index = s.dataset.index;
  nav.appendChild(a);
});
const dots = nav.querySelectorAll('a');

function updateActive(idx) {
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
  nav.classList.toggle('hidden', idx === 0 || idx === slides.length - 1);
}

const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      updateActive(parseInt(e.target.dataset.index));
    }
  });
}, { threshold: 0.4 });
slides.forEach(s => obs.observe(s));

dots.forEach(d => {
  d.addEventListener('click', e => {
    e.preventDefault();
    const idx = parseInt(d.dataset.index);
    slides[idx].scrollIntoView({ behavior: 'smooth' });
  });
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    const cur = [...slides].findIndex(s => {
      const r = s.getBoundingClientRect();
      return r.top <= 120 && r.bottom > 120;
    });
    if (cur < slides.length - 1) slides[cur + 1].scrollIntoView({ behavior: 'smooth' });
  }
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    const cur = [...slides].findIndex(s => {
      const r = s.getBoundingClientRect();
      return r.top <= 120 && r.bottom > 120;
    });
    if (cur > 0) slides[cur - 1].scrollIntoView({ behavior: 'smooth' });
  }
});

updateActive(0);
</script>
</body>
